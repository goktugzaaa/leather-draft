<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 180" width="100%" height="100%">
  <style>
    .font-main {
      font-family: "Montserrat", "Helvetica Neue", "Segoe UI", sans-serif;
      font-weight: 700;
    }
    .font-sub {
      font-family: "Montserrat", "Helvetica Neue", "Segoe UI", sans-serif;
      font-weight: 300;
      letter-spacing: 1.5px;
    }
    .color-charcoal { fill: #4A4A4A; }
    .color-tan { fill: #A36937; }
  </style>

  <g transform="translate(10, 20)">
    <text y="90" font-size="82" class="font-main">
      <tspan class="color-charcoal">De</tspan>
      <tspan class="color-tan" dx="12">Leather</tspan>
      <tspan class="color-charcoal" dx="15">Craft</tspan>
    </text>

    <text x="200" y="138" font-size="28" class="font-sub color-charcoal">
      luxury care for your luxury leather...
    </text>
  </g>
</svg>
